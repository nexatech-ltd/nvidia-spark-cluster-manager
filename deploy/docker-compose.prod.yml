version: "3.8"
services:
  spark-manager:
    image: spark-manager:latest
    ports:
      - target: 8443
        published: 8443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/run/libvirt/libvirt-sock:/var/run/libvirt/libvirt-sock
      - /data:/data
      - /etc/slurm:/etc/slurm:ro
      - /home/user/.ssh:/root/.ssh:ro
    environment:
      - SPARK_MANAGER_SECRET_KEY=changeme
      - SPARK_MANAGER_NODE1_IP=10.10.10.1
      - SPARK_MANAGER_NODE2_IP=10.10.10.2
      - SPARK_MANAGER_SSH_USER=user
      - SPARK_MANAGER_SSH_KEY_PATH=/root/.ssh/id_ed25519
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == spark-1
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.spark-manager.rule=PathPrefix(`/`)"
        - "traefik.http.routers.spark-manager.entrypoints=web"
        - "traefik.http.routers.spark-manager.priority=1"
        - "traefik.http.services.spark-manager.loadbalancer.server.port=8443"
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
