---
- name: Create deploy directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/spark-manager
    - /opt/spark-manager/deploy
    - /opt/spark-manager/backend
    - /opt/spark-manager/frontend

- name: Create local project tarball
  delegate_to: localhost
  become: false
  ansible.builtin.shell: >
    cd {{ playbook_dir }}/../../ &&
    tar czf /tmp/spark-manager.tar.gz
    --exclude='.git' --exclude='node_modules' --exclude='__pycache__' --exclude='.venv'
    --exclude='ansible' --exclude='.DS_Store'
    backend frontend deploy README.md
  run_once: true

- name: Upload project tarball
  ansible.builtin.copy:
    src: /tmp/spark-manager.tar.gz
    dest: /tmp/spark-manager.tar.gz
    mode: "0644"

- name: Extract project tarball
  ansible.builtin.unarchive:
    src: /tmp/spark-manager.tar.gz
    dest: /opt/spark-manager/
    remote_src: true

- name: Deploy docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/spark-manager/deploy/docker-compose.yml
    mode: "0644"

- name: Build spark-manager image
  ansible.builtin.command: >
    docker build -t spark-manager:latest
    -f /opt/spark-manager/deploy/Dockerfile /opt/spark-manager
  changed_when: true

- name: Deploy spark-manager stack
  ansible.builtin.command: >
    docker stack deploy -c /opt/spark-manager/deploy/docker-compose.yml spark-manager
  changed_when: true

- name: Force restart spark-manager service to pick up new image
  ansible.builtin.command: >
    docker service update --force spark-manager_spark-manager
  changed_when: true
