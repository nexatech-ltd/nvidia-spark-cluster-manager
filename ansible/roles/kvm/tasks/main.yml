---
- name: Install KVM packages
  ansible.builtin.apt:
    name:
      - qemu-kvm
      - qemu-efi-aarch64
      - libvirt-daemon-system
      - libvirt-clients
      - virtinst
      - ovmf
      - libosinfo-bin
      - gir1.2-libosinfo-1.0
    state: present

- name: Add user to libvirt and kvm groups
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: libvirt,kvm
    append: true

- name: Enable and start libvirtd
  ansible.builtin.systemd:
    name: libvirtd
    enabled: true
    state: started

- name: Set libvirt images directory ownership and permissions
  ansible.builtin.file:
    path: /var/lib/libvirt/images
    state: directory
    owner: root
    group: libvirt
    mode: "0775"

- name: Create QEMU config directory
  ansible.builtin.file:
    path: /etc/qemu
    state: directory
    mode: "0755"

- name: Configure QEMU bridge helper (allow virbr0)
  ansible.builtin.copy:
    dest: /etc/qemu/bridge.conf
    content: "allow virbr0\n"
    mode: "0644"

- name: Set setuid on qemu-bridge-helper for user-session networking
  ansible.builtin.file:
    path: /usr/lib/qemu/qemu-bridge-helper
    mode: "4755"

- name: Create ISO directory
  ansible.builtin.file:
    path: /var/lib/libvirt/isos
    state: directory
    mode: "0755"

- name: Define default storage pool
  ansible.builtin.command: virsh pool-define-as default dir --target /var/lib/libvirt/images
  ignore_errors: true

- name: Start and autostart default pool
  ansible.builtin.shell: virsh pool-start default && virsh pool-autostart default
  ignore_errors: true

- name: Define ISO storage pool
  ansible.builtin.command: virsh pool-define-as isos dir --target /var/lib/libvirt/isos
  ignore_errors: true

- name: Start and autostart ISO pool
  ansible.builtin.shell: virsh pool-start isos && virsh pool-autostart isos
  ignore_errors: true

- name: Deploy libvirt bridge network XML
  ansible.builtin.template:
    src: bridge-net.xml.j2
    dest: "/tmp/libvirt-net-{{ item }}.xml"
    mode: "0644"
  loop: "{{ bridge_names }}"

- name: Define libvirt bridge networks
  ansible.builtin.command: virsh net-define /tmp/libvirt-net-{{ item }}.xml
  loop: "{{ bridge_names }}"
  ignore_errors: true

- name: Start and autostart libvirt bridge networks
  ansible.builtin.shell: virsh net-start {{ item }} && virsh net-autostart {{ item }}
  loop: "{{ bridge_names }}"
  ignore_errors: true
