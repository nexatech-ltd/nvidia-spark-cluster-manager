---
- name: Base system configuration
  hosts: all
  roles:
    - common

- name: Network bonding and bridges
  hosts: all
  roles:
    - networking

- name: NFS cross-mounts
  hosts: all
  roles:
    - nfs

- name: Docker Swarm cluster
  hosts: all
  roles:
    - docker_swarm

- name: KVM hypervisor
  hosts: all
  roles:
